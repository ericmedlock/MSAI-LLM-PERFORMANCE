# =====================================================================
# FROZEN EXPERIMENT CONFIG  --  source of pinned values for every cell
# =====================================================================
# Per PRE_REGISTRATION.md, the following are held IDENTICAL across all
# backends and both environments. Only `active_environment` and the
# backend selected on the CLI change between runs. Do not edit after the
# pilot freeze except via the pre-registration Amendment Log.

# Which environment this machine represents. Read from config, never code.
#   local -> Apple M5 Max (Metal)   |   cloud -> Azure GPU VM (CUDA)
active_environment: local

model:
  # Canonical (provider-independent) identity of the pinned model. Each
  # environment maps this to its own provider-specific id below; both are
  # recorded on every telemetry row so cells stay comparable.
  tag: "deepseek-r1-14b-distill-q4_k_m"
  quantization: "Q4_K_M"
  digest: "sha256:4b90205bacb6938e72196dbb84cd2a79987b2f93efc270496832963e8d0f56af"
  # ^ sha256 of DeepSeek-R1-Distill-Qwen-14B-Q4_K_M.gguf (LM Studio artifact).
  # Filled 2026-07-09 (Amendment Log); v1-freeze rows carry the earlier
  # config_hash computed while this field was empty.

decoding:
  # Raised 0.0 -> 0.6 (Amendment Log 2026-07-15). At temperature 0.0 with a seed
  # held constant across trials, every one of the N trials executed the SAME
  # deterministic computation: ~98% of N=5 cells returned identical verdicts on
  # all five trials, so N measured floating-point jitter, not model variance
  # (engineering log §9). 0.6 is DeepSeek-R1's documented operating point
  # (model card recommends 0.5-0.7; temp 0 risks repetition/degradation for R1).
  temperature: 0.6                 # sampling ON so N draws real samples (pre-reg S5)
  num_ctx: 8192                    # fixed context window
  max_tokens: 6144                 # fixed max output tokens; raised from 2048 —
                                   # DeepSeek-R1's chain-of-thought exhausted 2048
                                   # on code tasks before emitting any code (see
                                   # Amendment Log 2026-07-01). Held constant across cells.
  seed: 42                         # base seed -> reproducible (see trials.seed_strategy)

trials:
  n: 5                             # runs per (task x architecture x environment)
  # Per-TRIAL decoding seed (Amendment Log 2026-07-15). `offset` -> trial t draws
  # with (seed + t * seed_stride), so each of the N trials is an independent draw.
  # This is the trial-level analogue of architectures.swarm.peer_seed_strategy: the
  # 2026-07-01 amendment fixed exactly this flaw for swarm PEERS ("a single shared
  # seed at temperature 0.0 ... voids the independent-samples premise") but it was
  # never applied to TRIALS — so N re-ran one computation N times (eng log §9).
  # `same` -> all trials share the pinned seed (the old, deterministic behavior).
  seed_strategy: offset            # offset | same
  # Stride between trial seeds. MUST exceed architectures.swarm.num_agents, or a
  # trial's peer seeds would collide with the next trial's (peer_seed = trial_seed
  # + peer_index), silently correlating trials — the flaw we are removing.
  seed_stride: 1000

architectures:
  agentic:
    max_loops: 2                   # Executor+Verifier, diminishing returns after 2
  swarm:
    num_agents: 3                  # parallel peers
    aggregation: majority_vote
    tie_break: lowest_agent_index  # fixed rule: on a tie, take earliest peer's answer
    # Per-peer decoding seed. `offset` -> peer i draws with (seed + i) so the
    # peers are independent samples (required by pre-reg S2's "independent
    # samples" premise, which a single shared seed at temperature 0.0 would
    # violate). `same` -> all peers share the pinned seed. See Amendment Log
    # entry 2026-07-01 in PRE_REGISTRATION.md.
    peer_seed_strategy: offset     # offset | same

# Per-environment serving config. `provider` selects the client:
#   openai  -> OpenAI-compatible server (LM Studio, vLLM, llama.cpp)
#   ollama  -> native Ollama /api/chat
# `model` is the provider-specific model id. Any of provider/base_url/model/
# api_key can be overridden per-machine (without editing this committed file)
# via a .env file -- see .env.example. Endpoints/keys are machine-specific and
# belong in .env; the pinned science stays here.
environments:
  local:
    name: "Apple M5 Max (48GB, Metal) — LM Studio"
    provider: openai
    base_url: "http://localhost:1234/v1"
    model: "deepseek-r1-distill-qwen-14b"   # LM Studio model id
    api_key_env: LLM_API_KEY                 # optional; LM Studio ignores the value
    runtime: metal
  cloud:
    name: "Azure GPU VM (Ubuntu, CUDA) — Ollama"
    provider: ollama
    base_url: "http://localhost:11434"
    model: "deepseek-r1:14b"                 # Ollama tag
    api_key_env: LLM_API_KEY
    runtime: cuda
  shadow:
    name: "Shadow Power Pro (RTX A4500 24GB, CUDA) — Ollama"
    provider: ollama
    base_url: "http://localhost:11434"
    model: "deepseek-r1:14b"                 # Ollama tag (same artifact family as cloud)
    api_key_env: LLM_API_KEY
    runtime: cuda
    # Trial/rehearsal environment (pre-reg lists Shadow as out-of-scope for the
    # study cells): validates the CUDA/NVML telemetry path and the Ollama
    # provider ahead of the HPC + Azure runs. Rows are stamped environment=shadow.
  hpc:
    name: "UNCC Research HPC (CUDA) — Ollama"
    provider: ollama
    base_url: "http://localhost:11434"
    model: "deepseek-r1:14b"                 # Ollama tag
    api_key_env: LLM_API_KEY
    runtime: cuda
    # Compute environment for the frontier confirmatory sweep + scaling legs
    # (docs/HPC_RUNBOOK.md). Rows are stamped environment=hpc.

# LLM-as-judge: a SECONDARY quality metric produced by a post-processing pass
# (harness.judge) AFTER all benchmark runs are recorded. Binary auto-grading
# stays the PRIMARY metric (pre-reg S7); the judge adds a graded-quality score
# and an independent correctness opinion. The judge model is deliberately a
# DIFFERENT FAMILY from the backend (backend = Qwen-based DeepSeek-R1 distill;
# judge = Llama) to avoid a model rewarding its own family. Overridable via
# JUDGE_PROVIDER / JUDGE_BASE_URL / JUDGE_MODEL in .env.
# NOTE: a heavier judge (e.g. google/gemma-4-31b) grades the quality scale more
# reliably but was too slow to load on the M5 Max in testing; llama-3.2-3b is
# fast and reliable for the CORRECT/INCORRECT verdict, though its 0-4 quality
# score is noisier. Swap up when a bigger judge is practical.
judge:
  provider: openai
  base_url: "http://localhost:1234/v1"
  model: "llama-3.2-3b-instruct"
  max_score: 4                     # quality scale 0..4
  prompt_file: "prompts/judge/system.txt"

tasks_manifest: "tasks/manifest.json"
prompts_dir: "prompts"
results_dir: "results"
