# =====================================================================
# FROZEN EXPERIMENT CONFIG  --  source of pinned values for every cell
# =====================================================================
# Per PRE_REGISTRATION.md, the following are held IDENTICAL across all
# backends and both environments. Only `active_environment` and the
# backend selected on the CLI change between runs. Do not edit after the
# pilot freeze except via the pre-registration Amendment Log.

# Which environment this machine represents. Read from config, never code.
#   local -> Apple M5 Max (Metal)   |   cloud -> Azure GPU VM (CUDA)
active_environment: local

model:
  tag: "deepseek-r1:14b"          # Ollama tag, pinned
  quantization: "Q4_K_M"
  digest: ""                       # fill from `ollama show deepseek-r1:14b` at freeze

decoding:
  temperature: 0.0                 # pinned for determinism (see pre-reg S5 tension)
  num_ctx: 8192                    # fixed context window
  max_tokens: 2048                 # fixed max output tokens (Ollama num_predict)
  seed: 42                         # fixed seed -> reproducible sampling

trials:
  n: 5                             # runs per (task x architecture x environment)

architectures:
  agentic:
    max_loops: 2                   # Executor+Verifier, diminishing returns after 2
  swarm:
    num_agents: 3                  # parallel peers
    aggregation: majority_vote
    tie_break: lowest_agent_index  # fixed rule: on a tie, take earliest peer's answer

environments:
  local:
    name: "Apple M5 Max (48GB, Metal)"
    ollama_endpoint: "http://localhost:11434"
    runtime: metal
  cloud:
    name: "Azure GPU VM (Ubuntu, CUDA)"
    ollama_endpoint: "http://localhost:11434"
    runtime: cuda

tasks_manifest: "tasks/manifest.json"
prompts_dir: "prompts"
results_dir: "results"
